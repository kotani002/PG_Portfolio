name: Claude Code Review

# PRが作成された時・新しいコミットがpushされた時(synchronize)に自動でレビューを実行する。
# 「@claudeとメンションしたときだけ動く」方式ではなく、無条件で毎回レビューが飛ぶ設定。
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # レビューコメントを投稿するために必要
      id-token: write # claude-code-actionがOIDC経由でGitHubトークンを取得するために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 汎用promptだけだとClaudeが「レビュー内容を考える」ところまでで止まり、
          # 実際にPRへコメントを投稿するツール権限が無いため何も投稿されないことがある。
          # 公式のcode-reviewプラグインを使うことで、投稿までを含めて確実に実行させる。
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          claude_args: "--max-turns 10"
